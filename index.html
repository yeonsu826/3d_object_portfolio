<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연수의 3D 포트폴리오</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', 'Malgun Gothic', sans-serif;
            background-color: #121212;
            color: #eaeaea;
            overflow-x: hidden;
        }

        /* 3D 캔버스를 배경으로 깔기 위한 설정 */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 600px; /* 헤더 영역 높이만큼 지정 */
            z-index: -1;   /* 텍스트 뒤로 보내기 */
            pointer-events: none; /* 마우스 클릭은 텍스트나 버튼이 받도록 투과 */
        }

        header {
            text-align: center;
            height: 600px; /* 캔버스와 동일한 높이 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 배경을 투명하게 해서 뒤의 3D 캔버스가 보이게 함 */
            background: radial-gradient(circle, rgba(30,30,30,0.3) 0%, rgba(18,18,18,1) 100%);
            border-bottom: 1px solid #333;
            padding: 0 20px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0 0 15px 0;
            font-weight: 800;
            letter-spacing: -1px;
            color: #ffffff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5); /* 글자가 묻히지 않도록 그림자 추가 */
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        main {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #2a2a2a;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.8);
            border-color: #666;
        }

        .card-img {
            width: 100%;
            height: 220px;
            background-color: #2a2a2a; 
            
            background-position: center; 
            background-repeat: no-repeat; 
            background-size: contain; 
            
            /* background-image는 여기서 지웁니다 */
}

        .card-info { padding: 20px; }
        .card-title { margin: 0 0 8px 0; font-size: 1.25rem; color: #fff; }
        .card-desc { margin: 0; font-size: 0.95rem; color: #aaa; line-height: 1.5; }

        /* 카드 하단 버튼 컨테이너 */
        .card-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        /* 개별 버튼 공통 스타일 */
        .btn {
            flex: 1; /* 두 버튼이 정확히 반반씩 공간을 차지하게 함 */
            text-align: center;
            padding: 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        /* 3D 뷰어 메인 버튼 색상 */
        .btn-viewer {
            background-color: #4a90e2;
            color: white;
        }
        .btn-viewer:hover {
            background-color: #357abd;
        }

        /* 작업 과정 서브 버튼 색상 */
        .btn-process {
            background-color: #333;
            color: #ddd;
        }
        .btn-process:hover {
            background-color: #444;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <header>
        <h1>정연수 3D Portfoilo</h1>
        <p class="subtitle">개발과 3D 아트웍 결합한 인터렉티브 프로그램 만들기</p>
    </header>

    <main>
        <div class="grid-container">
            <a href="./object_pages/object.html?model=glasses_1" class="card">
                <div class="card-img" style="background-image: url('./images/glasses_1.png');"></div>
                <div class="card-info">
                    <h3 class="card-title">안경</h3>
                    <p class="card-desc">기본 안경 모델링</p>
                </div>
            </a>
            <a href="./object_pages/object.html?model=glasses_2" class="card">
                <div class="card-img" style="background-image: url('./images/glasses_2.png');"></div>
                <div class="card-info">
                    <h3 class="card-title">K-style 안경</h3>
                    <p class="card-desc">K-style 안경 모델</p>
                </div>
            </a>
            <a href="./object_pages/object.html?model=glasses_3" class="card">
                <div class="card-img" style="background-image: url('./images/glasses_3.png');"></div>
                <div class="card-info">
                    <h3 class="card-title">VR 안경</h3>
                    <p class="card-desc">VR Glasses 모델링</p>
                </div>
            </a>
        </div>
        <div style="height: 60px;"></div> <!-- 메인과 푸터 사이 여백 -->


        <div class="grid-container">
            <a href="./object_pages/object.html?model=glasses_4" class="card">
                <div class="card-img" style="background-image: url('./images/glasses_4.png');"></div>
                <div class="card-info">
                    <h3 class="card-title" >안경 제작 과정</h3>
                    <p class="card-desc">제작 과정 설명 페이지</p>
                </div>
            </a>
        </div>

        </main>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 캔버스 요소 가져오기
        const canvas = document.getElementById('bg-canvas');
        const headerHeight = 600;

        const scene = new THREE.Scene();
        // 배경을 투명하게 설정하여 CSS 배경이 보이도록 함
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, headerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / headerHeight, 0.1, 1000);
        camera.position.set(0, 0, 4);

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
        directionalLight.position.set(5, 5, 2);
        scene.add(directionalLight);

        let mainModel;
        const loader = new GLTFLoader();

        // 대표 모델 불러오기 (원하는 모델 파일명으로 변경하세요)
        loader.load('./glb_files/glasses_1.glb', function (gltf) {
            mainModel = gltf.scene;
            
            // 크기 맞추기
            const box = new THREE.Box3().setFromObject(mainModel);
            const size = box.getSize(new THREE.Vector3());
            const maxAxis = Math.max(size.x, size.y, size.z);
            mainModel.scale.multiplyScalar(2.5 / maxAxis); 

            // 중앙 정렬
            box.setFromObject(mainModel);
            const center = box.getCenter(new THREE.Vector3());
            mainModel.position.x -= center.x;
            mainModel.position.y -= center.y;
            mainModel.position.z -= center.z;

            // 모델의 투명도 오류 방지 코드 적용
            mainModel.traverse(function (child) {
                if (child.isMesh && child.material) {
                    child.material.transparent = false;
                    child.material.depthWrite = true;
                }
            });

            scene.add(mainModel);
        });

        // 마우스 위치 추적 변수
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = headerHeight / 2;

        // 마우스가 움직일 때마다 목표 회전값 갱신
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // 부드러운 애니메이션 루프
        function animate() {
            requestAnimationFrame(animate);

            // 모델이 존재할 때만 회전 적용
            if (mainModel) {
                // 목표값으로 부드럽게 보간 (Lerp)
                targetX = mouseX * 0.001;
                targetY = mouseY * 0.001;

                mainModel.rotation.y += 0.05 * (targetX - mainModel.rotation.y);
                mainModel.rotation.x += 0.05 * (targetY - mainModel.rotation.x);
                
                // 기본적으로 천천히 돌아가는 효과 추가
                mainModel.rotation.y += 0.002; 
            }

            renderer.render(scene, camera);
        }
        animate();

        // 창 크기 조절 대응
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / headerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, headerHeight);
        });
    </script>
</body>
</html>
