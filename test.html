<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>픽셀 카드 UI 테스트</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodnf/neodunggeunmo-pro@1.0.0/neodunggeunmo-pro.css">
    <style>
        body {
            background-color: #5c747c; /* 이미지 배경의 탁한 청록색 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'NeoDunggeunmo Pro', sans-serif;
        }

        /* 카드의 도트 테두리를 box-shadow로 구현 */
        .pixel-card {
            background-color: #3b5a64; /* 카드 내부 배경색 */
            width: 300px;
            padding: 20px;
            position: relative;
            /* 겉은 낡은 종이색, 안쪽은 진한 갈색 테두리 */
            border: 4px solid #3d2e29;
            box-shadow: 
                0 0 0 4px #d4c5b3,
                0 0 0 8px #3d2e29,
                10px 10px 0px rgba(0,0,0,0.2);
        }

        /* 카드 상단 헤더 (이름 부분) */
        .card-header {
            display: flex;
            align-items: center;
            background-color: #d4c5b3;
            border: 4px solid #3d2e29;
            padding: 5px 10px;
            margin-bottom: 20px;
        }

        .level-icon {
            background-color: #4eb5a6;
            color: #3d2e29;
            padding: 2px 6px;
            border: 2px solid #3d2e29;
            margin-right: 10px;
            font-weight: bold;
        }

        .card-title {
            color: #3d2e29;
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 2px;
        }

        /* 3D 모델이 들어갈 자리 (현재는 빈 공간) */
        .model-container {
            height: 150px;
            background-color: rgba(0,0,0,0.2);
            border: 4px dashed #3d2e29;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #92b0b3;
        }

        /* 하단 능력치 게이지 바 */
        .stats-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stat-num {
            color: #d4c5b3;
            font-size: 1.2rem;
            width: 20px;
            text-shadow: 2px 2px 0 #3d2e29;
        }

        .stat-bar-bg {
            flex-grow: 1;
            height: 16px;
            background-color: #2a3d44;
            border: 4px solid #3d2e29;
            position: relative;
        }

        /* 게이지 색상들 */
        .stat-fill.yellow { background-color: #e5aa45; width: 70%; height: 100%; }
        .stat-fill.blue { background-color: #42749a; width: 40%; height: 100%; }
        .stat-fill.green { background-color: #4eb5a6; width: 85%; height: 100%; }

    </style>
</head>
<body>

    <div class="pixel-card">
        <div class="card-header">
            <div class="level-icon">3</div>
            <h2 class="card-title">GLASSES 01</h2>
        </div>

        <div class="model-container">
            (여기에 3D 안경 렌더링)
        </div>

        <div class="stats-container">
            <div class="stat-row">
                <span class="stat-num">5</span>
                <div class="stat-bar-bg"><div class="stat-fill yellow"></div></div>
            </div>
            <div class="stat-row">
                <span class="stat-num">3</span>
                <div class="stat-bar-bg"><div class="stat-fill blue"></div></div>
            </div>
            <div class="stat-row">
                <span class="stat-num">6</span>
                <div class="stat-bar-bg"><div class="stat-fill green"></div></div>
            </div>
        </div>
    </div>

</body>
</html>
